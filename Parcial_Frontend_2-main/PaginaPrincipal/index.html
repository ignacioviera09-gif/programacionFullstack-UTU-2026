<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Minimal Store</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#categorias">Categorías</a></li>
            </ul>
        </nav>

        <div class="acciones">
            <a href="../Perfil/index.html">
                <button id="btnPerfil">
                    Mi Perfil
                </button>
            </a>

            <button id="btnCarrito" aria-label="Abrir carrito">
                🛒
                <span id="cantidadCarrito">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-texto">
            <h2>
                Descubrí productos para tu día a día
            </h2>

            <p>
                Tecnología, ropa, accesorios y mucho más.
            </p>
        </div>
    </section>


    <main>
        <section class="filtros">
            <input type="text" id="buscador" placeholder="Buscar productos...">

            <select id="categorias">
                <option value="">
                    Todas las categorías
                </option>
            </select>
        </section>

        <section id="productos">
            <h2>Productos</h2>

            <!-- mensaje que se muestra mientras se cargan los productos -->
            <p id="mensajeProductos">
                Cargando productos...
            </p>

            <!-- Aca js agregará las tarjetas -->
            <div class="contenedor-productos" id="contenedorProductos">

            </div>
        </section>
    </main>

    <aside id="carrito">
        <div class="cabecera-carrito">
            <h2>Carrito</h2>
            
            <button id="cerrarCarrito" aria-label="Cerrar carrito">
                ✖
            </button>
        </div>

        <!-- js agregará los productos -->
        <div class="productos-carrito" id="productosCarrito">
            <p id="mensajeCarrito">
                Tu carrito está vacío.
            </p>
        </div>

        <div class="total">
            <h3>Total</h3>
            <p id="precioTotal">
                $0.00
            </p>
        </div>
    </aside>

    <footer>
        <p>
            © 2026 Minimal Store.
        </p>
    </footer>

    <script src="Principal.js"></script>
</body>
</html>
